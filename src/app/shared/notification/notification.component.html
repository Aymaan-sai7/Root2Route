<div class="relative">
  @if (variant === 'inline') {
    <button
      type="button"
      (click)="toggle()"
      class="nav-drawer-notification-btn"
      aria-label="الإشعارات"
    >
      <span class="nav-drawer-link-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </span>
      <span class="nav-drawer-link-text">{{ label }}</span>
      @if (unreadCount() > 0) {
        <span class="nav-drawer-notification-badge">{{ unreadCount() > 9 ? '9+' : unreadCount() }}</span>
      }
    </button>
  } @else {
    <button
      type="button"
      (click)="toggle()"
      class="relative flex items-center justify-center w-10 h-10 rounded-full text-steel hover:text-ink hover:bg-surface-alt transition-colors"
      aria-label="الإشعارات"
    >
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      @if (unreadCount() > 0) {
        <span class="absolute -top-0.5 -left-0.5 min-w-[18px] h-[18px] px-1 flex items-center justify-center rounded-full bg-danger text-white text-[10px] font-bold leading-none">
          {{ unreadCount() > 9 ? '9+' : unreadCount() }}
        </span>
      }
    </button>
  }

  @if (isOpen()) {
    <div
      [class]="variant === 'inline'
        ? 'nav-drawer-notification-panel'
        : 'absolute left-0 mt-2 w-80 max-w-[90vw] bg-surface border border-line rounded-xl shadow-lg z-50 overflow-hidden'"
      dir="rtl"
    >
      @if (variant === 'dropdown') {
        <div class="flex items-center justify-between px-4 py-3 border-b border-line">
          <span class="font-semibold text-ink text-sm">الإشعارات</span>
          @if (unreadCount() > 0) {
            <button type="button" (click)="markAllRead()" class="text-xs text-primary hover:underline">
              تحديد الكل كمقروء
            </button>
          }
        </div>
      }
      <div class="max-h-96 overflow-y-auto">
        @if (loading()) {
          <div class="py-8 text-center text-steel text-sm">بيتحمّل...</div>
        } @else if (notifications().length === 0) {
          <div class="py-10 flex flex-col items-center gap-2 text-steel">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="text-sm">مفيش إشعارات لسه</span>
          </div>
        } @else {
          @for (n of notifications(); track n.id) {
            <button
              type="button"
              (click)="onItemClick(n)"
              class="w-full text-right flex gap-3 px-4 py-3 border-b border-line last:border-b-0 hover:bg-surface-alt transition-colors"
              [class.bg-surface-alt]="!n.isRead"
            >
              <span
                class="mt-1.5 shrink-0 w-2 h-2 rounded-full"
                [class.bg-primary]="!n.isRead"
                [class.bg-transparent]="n.isRead"
              ></span>
              <span class="flex-1 min-w-0">
                <span class="block text-sm font-medium text-ink">{{ n.title }}</span>
                <span class="block text-xs text-steel mt-0.5 line-clamp-2">{{ n.message }}</span>
                <span class="block text-[11px] text-steel mt-1">{{ timeAgo(n.createdAt) }}</span>
              </span>
            </button>
          }
        }
      </div>
    </div>
  }
</div>

<div class="asel-wrap">
  <button type="button" class="asel-trigger" [class.asel-trigger--open]="open()" (click)="toggle()">
    <span class="asel-trigger-label">
      {{ selectedOption() ? selectedOption()!.label : placeholder() }}
    </span>
    <svg class="asel-chevron" [class.asel-chevron--open]="open()" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  @if (open()) {
    <div class="asel-panel">
      <button
        type="button"
        class="asel-option"
        [class.asel-option--active]="value() === ''"
        (click)="select('')"
      >
        <span>{{ placeholder() }}</span>
        @if (value() === '') {
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
        }
      </button>
      @for (opt of options(); track opt.value) {
        <button
          type="button"
          class="asel-option"
          [class.asel-option--active]="value() === opt.value"
          (click)="select(opt.value)"
        >
          <span>{{ opt.label }}</span>
          @if (value() === opt.value) {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
          }
        </button>
      }
    </div>
  }
</div>

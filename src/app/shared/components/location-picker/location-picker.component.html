<div class="lp-overlay" (click)="onBackdropClick($event)">
  <div class="lp-modal">

    <div class="lp-header">
      <h3 class="lp-title">حدد موقعك بالظبط</h3>
      <button type="button" class="lp-close-btn" (click)="close()" aria-label="إغلاق">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <p class="lp-hint">اضغط الزرار تحت عشان نحدد مكانك تلقائيًا، أو اسحب الدبوس بنفسك</p>

    <!-- ⚠️ جديد: أسهل طريقة — GPS مباشر بدل السحب اليدوي -->
    <button type="button" class="lp-gps-btn" (click)="useMyLocation()" [disabled]="gpsLoading()">
      @if (gpsLoading()) {
        <div class="lp-gps-spinner"></div>
        بيحدد موقعك...
      } @else {
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
        استخدم موقعي الحالي (الأسهل)
      }
    </button>

    <div class="lp-map-wrap">
      <div #mapContainer class="lp-map"></div>
      @if (loading()) {
        <div class="lp-loading-overlay">
          <div class="lp-spinner"></div>
          <span>بيحمل الخريطة...</span>
        </div>
      }
    </div>

    @if (matchedLevel() === 'city' || matchedLevel() === 'governorate') {
      <p class="lp-approx-note">
        📍 دي أقرب نقطة لقيناها لمنطقتك — اسحب الدبوس لمكانك بالظبط أو استخدم موقعك الحالي.
      </p>
    }

    <div class="lp-footer">
      <button type="button" class="lp-btn-outline" (click)="close()">إلغاء</button>
      <button type="button" class="lp-btn-fill" (click)="confirm()">تأكيد الموقع</button>
    </div>

  </div>
</div>

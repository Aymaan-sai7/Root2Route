<div class="lp-overlay" (click)="onBackdropClick($event)">
  <div class="lp-modal">

    <div class="lp-header">
      <h3 class="lp-title">حدد موقعك بالظبط</h3>
      <button type="button" class="lp-close-btn" (click)="close()" aria-label="إغلاق">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <p class="lp-hint">اسحب الدبوس أو دوس على مكانك بالظبط على الخريطة</p>

    <div class="lp-map-wrap">
      <div #mapContainer class="lp-map"></div>
      @if (loading()) {
        <div class="lp-loading-overlay">
          <div class="lp-spinner"></div>
          <span>بيحمل الخريطة...</span>
        </div>
      }
    </div>

    <div class="lp-footer">
      <button type="button" class="lp-btn-outline" (click)="close()">إلغاء</button>
      <button type="button" class="lp-btn-fill" (click)="confirm()">تأكيد الموقع</button>
    </div>

  </div>
</div>

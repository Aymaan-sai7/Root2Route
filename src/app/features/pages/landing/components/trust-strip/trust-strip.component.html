<section class="border-y border-line bg-paper py-8 overflow-hidden">
  <div class="mx-auto max-w-content px-5 md:px-8" appScrollReveal>
    <p class="mb-6 text-center text-xs font-medium uppercase tracking-wide text-steel">
      بثقة أكتر من ٢٠٠٠ بيت ومحل
    </p>
  </div>

  <div class="marquee-mask relative w-full">
    <div class="marquee-track">

      @for (i of [0, 1, 2, 3]; track i) {
        @for (badge of badges; track badge.label) {
          <span class="trust-badge" [attr.aria-hidden]="i > 0 ? 'true' : null">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M9 12l2 2 4-4"/>
              <circle cx="12" cy="12" r="9"/>
            </svg>
            {{ badge.label }}
          </span>
        }
      }

    </div>
  </div>
</section>

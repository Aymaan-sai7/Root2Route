<aside class="admin-sidebar">

  <div class="admin-sidebar-logo">
    <a routerLink="/admin/dashboard" class="flex items-center gap-2.5">
      <img src="/sanaye3i_nav.png" alt="Sanaye3i Logo" class="h-7 w-auto object-contain" />
      <div>
        <p class="font-display text-base font-semibold text-white leading-none">صنايعي</p>
        <p class="admin-sidebar-badge-label">لوحة تحكم الأدمن</p>
      </div>
    </a>
  </div>

  <nav class="admin-nav">
    <a routerLink="/admin/dashboard" routerLinkActive="admin-nav-link--active" class="admin-nav-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span class="admin-nav-label">الرئيسية</span>
    </a>

    <!-- الصفحات دي جاية في مرحلة قادمة — الروابط ظاهرة بس مش شغالة لسه -->
    <span class="admin-nav-link admin-nav-link--disabled">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span class="admin-nav-label">طلبات التسجيل</span>
      @if (pendingApprovals() > 0) {
        <span class="admin-nav-badge">{{ pendingApprovals() > 9 ? '9+' : pendingApprovals() }}</span>
      } @else {
        <span class="admin-nav-soon">قريبًا</span>
      }
    </span>

    <span class="admin-nav-link admin-nav-link--disabled">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span class="admin-nav-label">المستخدمين</span>
      <span class="admin-nav-soon">قريبًا</span>
    </span>

    <span class="admin-nav-link admin-nav-link--disabled">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
      <span class="admin-nav-label">الحجوزات</span>
      <span class="admin-nav-soon">قريبًا</span>
    </span>

    <span class="admin-nav-link admin-nav-link--disabled">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
      </svg>
      <span class="admin-nav-label">التقييمات</span>
      <span class="admin-nav-soon">قريبًا</span>
    </span>
  </nav>

  <div class="admin-sidebar-footer">
    <button class="admin-logout-btn" (click)="logout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      تسجيل خروج
    </button>
  </div>

</aside>

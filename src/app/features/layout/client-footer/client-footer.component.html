<footer class="cf-footer">
  <div class="cf-inner">

    <div class="cf-top">
      <!-- Brand -->
      <div class="cf-brand-col">
        <a routerLink="/find-services" class="cf-brand">
          <img src="/sanaye3i_nav.png" alt="Sanaye3i Logo" class="cf-logo" />
          <span class="cf-brand-name">صنايعي</span>
        </a>
        <p class="cf-tagline">اطلب صنايعي موثوق في دقايق.</p>
      </div>

      <!-- Services quick links -->
      <div class="cf-col">
        <p class="cf-col-title">الخدمات الاكثر طلباً</p>
        @for (link of serviceLinks; track link.path) {
          <a [routerLink]="link.path" class="cf-col-link">{{ link.label }}</a>
        }
      </div>

      <!-- Account quick links -->
      <div class="cf-col">
        <p class="cf-col-title">حسابي</p>
        @for (link of accountLinks; track link.path) {
          <a [routerLink]="link.path" class="cf-col-link">{{ link.label }}</a>
        }
      </div>
    </div>

    <div class="cf-bottom">
      <p class="cf-copy">© {{ currentYear }} صنايعي. كل الحقوق محفوظة.</p>
    </div>

  </div>
</footer>

<div class="pro-layout">

  <!-- Sidebar -->
  <aside class="pro-sidebar">

    <div class="sidebar-logo">
      <a routerLink="/pro/dashboard" class="flex items-center gap-2.5">
      <img
        src="/sanaye3i_nav.png"
        alt="Sanaye3i Logo"
        class="h-11 w-auto object-contain"
/>        <div>
          <p class="font-display text-base font-semibold text-paper leading-none">صنايعي</p>
          <p class="sidebar-pro-label">بروفايل الصنايعي</p>
        </div>
      </a>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/pro/dashboard" routerLinkActive="sidebar-link--active" class="sidebar-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        الرئيسية
      </a>

      <a routerLink="/pro/requests" routerLinkActive="sidebar-link--active" class="sidebar-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
        الطلبات
      </a>

      <a routerLink="/pro/jobs" routerLinkActive="sidebar-link--active" class="sidebar-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        الشغل الجاري
      </a>

      <a routerLink="/pro/messages" routerLinkActive="sidebar-link--active" class="sidebar-link sidebar-link--messages">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="sidebar-link-label">الرسائل</span>
        @if (unreadCount() > 0) {
          <span class="sidebar-badge">{{ unreadCount() > 9 ? '9+' : unreadCount() }}</span>
        }
      </a>

      <a routerLink="/pro/settings" routerLinkActive="sidebar-link--active" class="sidebar-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        الإعدادات
      </a>
    </nav>

    <!-- Availability -->
    <div class="sidebar-availability">
      <span class="availability-dot"></span>
      <div>
        <p class="text-xs font-semibold text-paper">متاح دلوقتي</p>
        <p class="text-[10px] text-paper/45 mt-0.5">بيانك ظاهر للعملاء</p>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="sidebar-logout" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        تسجيل خروج
      </button>
    </div>

  </aside>

  <!-- Page Content -->
  <div class="pro-content">

    <!-- Topbar ← جديد: الشريط الوحيد اللي فيه الجرس، بره السايدبار خالص -->
    <div class="pro-topbar">
      <app-notification />
    </div>

    <router-outlet />
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-bottom-nav">
    <a routerLink="/pro/dashboard" routerLinkActive="mobile-nav-item--active" class="mobile-nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span>الرئيسية</span>
    </a>

    <a routerLink="/pro/requests" routerLinkActive="mobile-nav-item--active" class="mobile-nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
      </svg>
      <span>الطلبات</span>
    </a>

    <a routerLink="/pro/jobs" routerLinkActive="mobile-nav-item--active" class="mobile-nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>
      <span>الشغل</span>
    </a>

    <a routerLink="/pro/messages" routerLinkActive="mobile-nav-item--active" class="mobile-nav-item">
      <span class="mobile-nav-icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        @if (unreadCount() > 0) {
          <span class="mobile-nav-badge">{{ unreadCount() > 9 ? '9+' : unreadCount() }}</span>
        }
      </span>
      <span>الرسائل</span>
    </a>

    <a routerLink="/pro/settings" routerLinkActive="mobile-nav-item--active" class="mobile-nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>الإعدادات</span>
    </a>
  </nav>

</div>
